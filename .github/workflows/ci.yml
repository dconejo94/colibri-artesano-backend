name: CI Backend Pipeline

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Ruff Lint Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - run: uv sync

      - run: uv lock --check

      - run: uv run ruff check .

      - run: uv run ruff format --check .

  tests:
    name: Pytest Suite
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: colibri
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: colibri
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      SQL_ECHO: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - run: uv sync

      - run: uv lock --check

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest -v --cov=src --cov-report=term-missing